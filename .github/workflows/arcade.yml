name: Generate arcade animation

on:
  schedule: # Mengeksekusi setiap 12 jam sekali secara tepat
    - cron: "0 */12 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # Langkah 1: Ambil data repositori terlebih dahulu (Penting agar sistem membaca direktori kerja)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Langkah 2: Generate grafik animasi arcade
      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: 'galaga'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Ini ditambahkan agar sistem bisa membaca data kontribusi Anda

      # Langkah 3: Push hasilnya ke branch output
      - name: push galaga-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: pacman-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}